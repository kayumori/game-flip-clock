<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flip Clock / Typing Ascent</title>
  <style>
  /* ============================================================
     Flip Clock  +  Typing Ascent（タイピング登山）
     ------------------------------------------------------------
     時計の数字カードがそのままスペル入力に変わるシステマチックUI
     ============================================================ */
  :root {
    --bg: #ffffff;
    --ink: #15171c;
    --sub: #8a8f99;
    --line: #e6e8ec;
    --card-bg: #16181d;
    --card-bg-2: #23262d;
    --card-low: #101216;
    --card-line: rgba(0, 0, 0, 0.6);
    --accent: #ffcf33;
    --done: #2fd0a6;
    --bad: #ff5d73;
    --radius: 12px;
    --card-w: 84px;
    --card-h: 124px;
    --gap: 7px;
    --font-size: 86px;
    --flip-speed: 0.3s;
    --lw: 62px;
    --lh: 94px;
    --lf: 56px;
    --mono: "SFMono-Regular", "Courier New", monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; background: var(--bg); color: var(--ink);
    font-family: var(--mono); display: grid; place-items: center; overflow: hidden;
  }
  .fit { display: block; }
  .stage {
    display: flex; flex-direction: column; align-items: center; gap: 16px;
    padding: 14px; width: max-content; transform-origin: top left;
  }
  .view { display: flex; flex-direction: column; align-items: center; gap: 16px; }

  /* ---------- フリップ時計 ---------- */
  .board { position: relative; display: flex; align-items: flex-end; gap: 10px; }
  .clock { position: relative; display: flex; align-items: center; gap: var(--gap); user-select: none; }
  .clock__group { display: flex; gap: var(--gap); }
  .clock__colon { display: flex; flex-direction: column; justify-content: center; gap: 16px; padding: 0 2px; }
  .clock__colon span { width: 9px; height: 9px; border-radius: 50%; background: var(--ink); animation: blink 2s steps(1) infinite; }
  @keyframes blink { 50% { opacity: 0.2; } }
  .clock__ampm {
    align-self: flex-end; margin-left: 3px; padding: 4px 7px; font-weight: 700;
    font-size: 14px; letter-spacing: 1px; color: var(--ink);
    border: 2px solid var(--ink); border-radius: 8px; transform: translateY(-6px);
  }

  .flip {
    position: relative; width: var(--card-w); height: var(--card-h);
    font-size: var(--font-size); font-weight: 700; border-radius: var(--radius);
    background: var(--card-bg);
    box-shadow: 0 18px 32px -12px rgba(0,0,0,.5), 0 6px 14px rgba(0,0,0,.15),
      inset 0 1px 0 rgba(255,255,255,.12), inset 0 -3px 8px rgba(0,0,0,.45);
  }
  .flip .top, .flip .bottom, .flip .flip-top, .flip .flip-bottom {
    position: absolute; left: 0; width: 100%; height: 50%; overflow: hidden; backface-visibility: hidden;
  }
  .flip .top, .flip .flip-top {
    top: 0; border-radius: var(--radius) var(--radius) 0 0;
    background: linear-gradient(180deg, var(--card-bg-2), var(--card-bg)); border-bottom: 1px solid var(--card-line);
  }
  .flip .bottom, .flip .flip-bottom {
    bottom: 0; border-radius: 0 0 var(--radius) var(--radius);
    background: linear-gradient(180deg, var(--card-bg), var(--card-low));
  }
  .flip .top span, .flip .bottom span, .flip .flip-top span, .flip .flip-bottom span {
    position: absolute; left: 0; width: 100%; height: var(--card-h); line-height: var(--card-h); text-align: center;
    background: linear-gradient(180deg, #ffffff 0%, #ededed 48%, #c4c4c4 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent; -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 2px 3px rgba(0,0,0,.5));
  }
  .flip .top span, .flip .flip-top span { top: 0; }
  .flip .bottom span, .flip .flip-bottom span { bottom: 0; }
  .flip .flip-top { z-index: 3; transform-origin: bottom; animation: flip-down var(--flip-speed) ease-in forwards; }
  .flip .flip-bottom { z-index: 2; transform-origin: top; transform: rotateX(90deg); animation: flip-up var(--flip-speed) ease-out var(--flip-speed) forwards; }
  @keyframes flip-down { to { transform: rotateX(-90deg); } }
  @keyframes flip-up   { to { transform: rotateX(0deg); } }

  /* ---------- 山アイコン（スタートボタン） ---------- */
  .mtn-icon {
    appearance: none; cursor: pointer; background: none; border: 2px solid var(--ink);
    border-radius: 12px; padding: 8px 12px; display: inline-flex; align-items: center; gap: 8px;
    color: var(--ink); font-family: var(--mono); font-size: 11px; letter-spacing: 2px; font-weight: 700;
    transition: background .15s, color .15s, transform .06s;
  }
  .mtn-icon svg { width: 22px; height: 22px; display: block; }
  .mtn-icon path { stroke: currentColor; stroke-width: 2; fill: none; stroke-linejoin: round; }
  .mtn-icon:hover { background: var(--ink); color: #fff; }
  .mtn-icon:active { transform: translateY(1px); }

  /* ---------- 共通：システマチックなボタン ---------- */
  .btn {
    appearance: none; font-family: var(--mono); font-weight: 700; cursor: pointer;
    border: 2px solid var(--ink); border-radius: 10px; background: #fff; color: var(--ink);
    padding: 9px 16px; font-size: 13px; letter-spacing: 1px; transition: background .12s, color .12s, transform .06s;
  }
  .btn:hover { background: var(--ink); color: #fff; }
  .btn:active { transform: translateY(1px); }
  .btn small { display: block; font-weight: 400; font-size: 9px; letter-spacing: 1px; opacity: .6; margin-top: 2px; }
  .btn:hover small { opacity: .85; }
  .linkbtn { appearance: none; background: none; border: none; cursor: pointer; font-family: var(--mono);
    font-size: 12px; font-weight: 700; letter-spacing: 1px; color: var(--sub); padding: 4px 6px; }
  .linkbtn:hover { color: var(--ink); }

  /* ---------- モード選択 ---------- */
  .msel__title { font-size: 12px; letter-spacing: 3px; color: var(--sub); font-weight: 700; }
  .msel__row { display: flex; gap: 12px; }
  .msel__row .btn { min-width: 104px; }

  /* ---------- タイピング ---------- */
  .tbar { display: flex; align-items: center; gap: 18px; font-size: 12px; letter-spacing: 2px; color: var(--sub); }
  .tbar b { color: var(--ink); font-size: 17px; letter-spacing: 1px; }
  .tbar .is-low { color: var(--bad); }
  .tbar #tRank { color: var(--ink); font-weight: 700; }
  .tbar .linkbtn { margin-left: 4px; font-size: 14px; }

  .tja { font-size: 26px; font-weight: 700; letter-spacing: 6px; color: var(--ink); }

  .lrow { display: flex; gap: var(--gap); }
  .lcard {
    position: relative; width: var(--lw); height: var(--lh); border-radius: var(--radius);
    background: var(--card-bg); display: grid; place-items: center;
    box-shadow: 0 14px 26px -12px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.12), inset 0 -3px 8px rgba(0,0,0,.45);
    transition: box-shadow .12s, transform .12s;
  }
  .lcard span {
    font-size: var(--lf); font-weight: 700; line-height: 1;
    background: linear-gradient(180deg, #ffffff 0%, #e6e6e6 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent; -webkit-text-fill-color: transparent;
  }
  .lcard.todo span { opacity: .28; }
  .lcard.cur { box-shadow: 0 0 0 3px var(--accent), 0 14px 26px -12px rgba(0,0,0,.5); }
  .lcard.done span { background: linear-gradient(180deg, #4ff0c6, #1fb98c); -webkit-background-clip: text; background-clip: text; }
  .lcard.wrong { animation: lshake .25s ease; }
  @keyframes lshake { 0%,100% { transform: translateX(0);} 25% { transform: translateX(-5px);} 75% { transform: translateX(5px);} }

  /* ---------- 登山プログレス ---------- */
  .ascent { width: 460px; max-width: 88vw; }
  .ascent__track { position: relative; height: 4px; background: var(--line); border-radius: 2px; }
  .ascent__fill { position: absolute; left: 0; top: 0; bottom: 0; width: 0; background: var(--ink); border-radius: 2px; transition: width .25s ease; }
  .ascent__marker { position: absolute; top: -9px; left: 0; transform: translateX(-50%); font-size: 12px; color: var(--ink); transition: left .25s ease; }
  .ascent__labels { display: flex; justify-content: space-between; margin-top: 6px; font-size: 10px; letter-spacing: 1px; color: var(--sub); }

  /* ---------- 結果 ---------- */
  .res__tag { font-size: 11px; letter-spacing: 4px; color: var(--sub); font-weight: 700; }
  .res__rank { font-size: 30px; font-weight: 700; letter-spacing: 2px; }
  .res__rank b { font-size: 42px; color: var(--ink); }
  .res__sub { font-size: 13px; letter-spacing: 2px; color: var(--sub); }
  .res__sub span { color: var(--ink); font-weight: 700; }
  .res__btns { display: flex; gap: 10px; margin-top: 6px; }

  .hidden-input { position: absolute; opacity: 0; width: 1px; height: 1px; pointer-events: none; }

  @media (prefers-reduced-motion: reduce) {
    .flip .flip-top, .flip .flip-bottom { animation-duration: .001s; }
    .clock__colon span { animation: none; }
  }
  </style>
</head>
<body>
  <div class="fit" id="fit">
  <main class="stage" id="stage">

    <!-- ============ 時計 ============ -->
    <section class="view" id="clockView">
      <div class="board">
        <div class="clock" id="clock" data-format="12" data-seconds="true">
          <div class="clock__group">
            <div class="flip" data-place="h-tens"><div class="top"><span>0</span></div><div class="bottom"><span>0</span></div></div>
            <div class="flip" data-place="h-ones"><div class="top"><span>0</span></div><div class="bottom"><span>0</span></div></div>
          </div>
          <div class="clock__colon"><span></span><span></span></div>
          <div class="clock__group">
            <div class="flip" data-place="m-tens"><div class="top"><span>0</span></div><div class="bottom"><span>0</span></div></div>
            <div class="flip" data-place="m-ones"><div class="top"><span>0</span></div><div class="bottom"><span>0</span></div></div>
          </div>
          <div class="clock__colon" data-sec-colon><span></span><span></span></div>
          <div class="clock__group" data-sec>
            <div class="flip" data-place="s-tens"><div class="top"><span>0</span></div><div class="bottom"><span>0</span></div></div>
            <div class="flip" data-place="s-ones"><div class="top"><span>0</span></div><div class="bottom"><span>0</span></div></div>
          </div>
          <div class="clock__ampm" data-ampm>PM</div>
        </div>
      </div>

      <button class="mtn-icon" id="mtnBtn" title="タイピング登山スタート" aria-label="タイピング登山スタート">
        <svg viewBox="0 0 24 24"><path d="M2 20 L9 7 L13 13 L17 5 L22 20 Z" /></svg>
        START
      </button>
    </section>

    <!-- ============ モード選択 ============ -->
    <section class="view" id="modeView" style="display:none">
      <div class="msel__title">SELECT COURSE</div>
      <div class="msel__row">
        <button class="btn" data-mode="easy">EASY<small>90s / かんたん</small></button>
        <button class="btn" data-mode="normal">NORMAL<small>60s / ふつう</small></button>
        <button class="btn" data-mode="hard">HARD<small>45s / むずかしい</small></button>
      </div>
      <button class="linkbtn" id="modeBack">← CLOCK</button>
    </section>

    <!-- ============ タイピング ============ -->
    <section class="view" id="typeView" style="display:none">
      <div class="tbar">
        <span>TIME <b id="tTime">60</b></span>
        <span>WORDS <b id="tCount">0</b></span>
        <span id="tRank">ふもと</span>
        <button class="linkbtn" id="tQuit" title="やめる">✕</button>
      </div>
      <div class="tja" id="tJa">ready</div>
      <div class="lrow" id="lrow"></div>
      <div class="ascent">
        <div class="ascent__track">
          <div class="ascent__fill" id="ascentFill"></div>
          <div class="ascent__marker" id="marker">▲</div>
        </div>
        <div class="ascent__labels"><span>ふもと</span><span>富士山</span><span>山頂</span></div>
      </div>
      <input class="hidden-input" id="tInput" inputmode="latin" autocomplete="off" autocapitalize="none" aria-hidden="true" />
    </section>

    <!-- ============ 結果 ============ -->
    <section class="view" id="resView" style="display:none">
      <div class="res__tag">RESULT</div>
      <div class="res__rank"><b id="rRank">富士山</b> 級</div>
      <div class="res__sub">WORDS <span id="rCount">0</span> &nbsp;·&nbsp; ACC <span id="rAcc">100</span>%</div>
      <div class="res__btns">
        <button class="btn" id="rRetry">RETRY</button>
        <button class="btn" id="rMode">COURSE</button>
        <button class="btn" id="rHome">CLOCK</button>
      </div>
    </section>

  </main>
  </div>

  <script>
  (function () {
    "use strict";

    let audioCtx = null;
    function beep(freq, dur, type = "square", vol = 0.05) {
      try {
        audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = type; o.frequency.value = freq; g.gain.value = vol;
        o.connect(g).connect(audioCtx.destination);
        const t = audioCtx.currentTime;
        g.gain.setValueAtTime(vol, t); g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
        o.start(t); o.stop(t + dur);
      } catch (_) {}
    }

    /* ---------- フリップ時計 ---------- */
    const clock = document.getElementById("clock");
    const ampm = clock.querySelector("[data-ampm]");
    const cards = {};
    clock.querySelectorAll(".flip").forEach((el) => (cards[el.dataset.place] = el));
    function flip(card, next) {
      const ts = card.querySelector(".top span"), bs = card.querySelector(".bottom span");
      const cur = ts.textContent;
      if (cur === next) return;
      ts.textContent = next; bs.textContent = cur;
      const ft = document.createElement("div"); ft.className = "flip-top"; ft.innerHTML = "<span>" + cur + "</span>";
      const fb = document.createElement("div"); fb.className = "flip-bottom"; fb.innerHTML = "<span>" + next + "</span>";
      card.append(ft, fb);
      ft.addEventListener("animationend", () => ft.remove());
      fb.addEventListener("animationend", () => { bs.textContent = next; fb.remove(); });
    }
    const setCard = (p, ch) => cards[p] && flip(cards[p], ch);
    function render() {
      const now = new Date();
      let h = now.getHours();
      const m = now.getMinutes(), s = now.getSeconds();
      if (clock.dataset.format === "12") { if (ampm) ampm.textContent = h >= 12 ? "PM" : "AM"; h = h % 12 || 12; }
      const hh = String(h).padStart(2, "0"), mm = String(m).padStart(2, "0"), ss = String(s).padStart(2, "0");
      setCard("h-tens", hh[0]); setCard("h-ones", hh[1]);
      setCard("m-tens", mm[0]); setCard("m-ones", mm[1]);
      setCard("s-tens", ss[0]); setCard("s-ones", ss[1]);
    }

    /* ============================================================
       タイピング登山
       ============================================================ */
    const MODES = { easy: { time: 90 }, normal: { time: 60 }, hard: { time: 45 } };
    const WORDS = {
      easy: [
        {ja:"すし",ro:"sushi"},{ja:"ねこ",ro:"neko"},{ja:"いぬ",ro:"inu"},{ja:"やま",ro:"yama"},
        {ja:"うみ",ro:"umi"},{ja:"そら",ro:"sora"},{ja:"はな",ro:"hana"},{ja:"ほし",ro:"hoshi"},
        {ja:"つき",ro:"tsuki"},{ja:"みず",ro:"mizu"},{ja:"あめ",ro:"ame"},{ja:"ゆき",ro:"yuki"},
        {ja:"とり",ro:"tori"},{ja:"くも",ro:"kumo"},{ja:"かさ",ro:"kasa"},{ja:"ふね",ro:"fune"},
        {ja:"たまご",ro:"tamago"},{ja:"りんご",ro:"ringo"},{ja:"くるま",ro:"kuruma"},{ja:"えき",ro:"eki"},
      ],
      normal: [
        {ja:"ともだち",ro:"tomodachi"},{ja:"がっこう",ro:"gakkou"},{ja:"でんしゃ",ro:"densha"},
        {ja:"さくら",ro:"sakura"},{ja:"おんがく",ro:"ongaku"},{ja:"たべもの",ro:"tabemono"},
        {ja:"てんき",ro:"tenki"},{ja:"かばん",ro:"kaban"},{ja:"えんぴつ",ro:"enpitsu"},
        {ja:"としょかん",ro:"toshokan"},{ja:"みかん",ro:"mikan"},{ja:"ひこうき",ro:"hikouki"},
        {ja:"せんせい",ro:"sensei"},{ja:"あさごはん",ro:"asagohan"},{ja:"でんわ",ro:"denwa"},
        {ja:"しんぶん",ro:"shinbun"},{ja:"やさい",ro:"yasai"},{ja:"おかし",ro:"okashi"},
      ],
      hard: [
        {ja:"しんかんせん",ro:"shinkansen"},{ja:"ありがとう",ro:"arigatou"},{ja:"とうきょう",ro:"toukyou"},
        {ja:"じてんしゃ",ro:"jitensha"},{ja:"しゅくだい",ro:"shukudai"},{ja:"りょこう",ro:"ryokou"},
        {ja:"ぎゅうにゅう",ro:"gyuunyuu"},{ja:"びじゅつかん",ro:"bijutsukan"},{ja:"こんにちは",ro:"konnichiha"},
        {ja:"きょうしつ",ro:"kyoushitsu"},{ja:"きっぷ",ro:"kippu"},{ja:"しゃしん",ro:"shashin"},
        {ja:"ひゃっかてん",ro:"hyakkaten"},{ja:"りゅうがく",ro:"ryuugaku"},{ja:"しゅっぱつ",ro:"shuppatsu"},
        {ja:"ちきゅう",ro:"chikyuu"},{ja:"ぎんこう",ro:"ginkou"},{ja:"しゃちょう",ro:"shachou"},
      ],
    };
    const RANKS = [
      { min: 0,  name: "ふもと" }, { min: 3,  name: "丘" }, { min: 7,  name: "高尾山" },
      { min: 12, name: "筑波山" }, { min: 18, name: "富士山" }, { min: 25, name: "モンブラン" },
      { min: 34, name: "エベレスト" },
    ];
    const SUMMIT = 34;
    function rankFor(n) { let r = RANKS[0]; for (const x of RANKS) if (n >= x.min) r = x; return r; }

    const views = ["clockView", "modeView", "typeView", "resView"];
    function showView(name) {
      views.forEach((v) => (document.getElementById(v).style.display = v === name ? "" : "none"));
      applyFit();
    }

    const lrow = document.getElementById("lrow");
    const tJa = document.getElementById("tJa");
    const tTime = document.getElementById("tTime");
    const tCount = document.getElementById("tCount");
    const tRank = document.getElementById("tRank");
    const ascentFill = document.getElementById("ascentFill");
    const marker = document.getElementById("marker");
    const typeView = document.getElementById("typeView");
    const tInput = document.getElementById("tInput");
    let T = null;

    function startTyping(mode) {
      T = { mode, timeLeft: MODES[mode].time, count: 0, hits: 0, miss: 0, target: "", pos: 0, cards: [], timerId: null };
      showView("typeView");
      nextWord(); updateTop(); updateAscent();
      try { tInput.focus(); } catch (_) {}
      clearInterval(T.timerId);
      T.timerId = setInterval(() => {
        T.timeLeft--; updateTop();
        tTime.classList.toggle("is-low", T.timeLeft <= 5);
        if (T.timeLeft <= 0) endTyping();
      }, 1000);
    }
    function nextWord() {
      const list = WORDS[T.mode];
      const w = list[(Math.random() * list.length) | 0];
      T.target = w.ro; T.pos = 0; tJa.textContent = w.ja;
      lrow.innerHTML = ""; T.cards = [];
      for (let i = 0; i < w.ro.length; i++) {
        const c = document.createElement("div");
        c.className = "lcard todo";
        c.innerHTML = "<span>" + w.ro[i] + "</span>";
        lrow.appendChild(c); T.cards.push(c);
      }
      paintCards();
    }
    function paintCards() {
      T.cards.forEach((c, i) => {
        c.classList.remove("todo", "cur", "done");
        if (i < T.pos) c.classList.add("done");
        else if (i === T.pos) c.classList.add("cur");
        else c.classList.add("todo");
      });
    }
    function updateTop() { tTime.textContent = Math.max(0, T.timeLeft); tCount.textContent = T.count; tRank.textContent = rankFor(T.count).name; }
    function updateAscent() {
      const p = Math.min(1, T.count / SUMMIT);
      ascentFill.style.width = (p * 100) + "%";
      marker.style.left = (p * 100) + "%";
    }
    function onKey(ch) {
      if (!T) return;
      if (ch === T.target[T.pos]) {
        T.pos++; T.hits++;
        beep(600 + T.pos * 28, 0.04, "square", 0.045);
        if (T.pos >= T.target.length) {
          T.count++; updateTop(); updateAscent();
          beep(900, 0.08, "triangle", 0.06);
          nextWord();
        } else { paintCards(); }
      } else {
        T.miss++;
        const c = T.cards[T.pos];
        if (c) { c.classList.remove("wrong"); void c.offsetWidth; c.classList.add("wrong"); }
        beep(150, 0.09, "sawtooth", 0.05);
      }
    }
    function endTyping() {
      clearInterval(T.timerId);
      document.getElementById("rRank").textContent = rankFor(T.count).name;
      document.getElementById("rCount").textContent = T.count;
      const total = T.hits + T.miss;
      document.getElementById("rAcc").textContent = total ? Math.round((T.hits / total) * 100) : 100;
      beep(620, 0.12); setTimeout(() => beep(990, 0.16), 130); setTimeout(() => beep(1320, 0.2), 280);
      showView("resView");
    }

    document.addEventListener("keydown", (e) => {
      if (typeView.style.display === "none") return;
      if (e.metaKey || e.ctrlKey || e.altKey) return;
      const ch = e.key.toLowerCase();
      if (ch.length === 1 && /[a-z\-]/.test(ch)) { e.preventDefault(); onKey(ch); }
    });
    tInput.addEventListener("input", () => {
      const v = tInput.value.toLowerCase();
      for (const ch of v) if (/[a-z\-]/.test(ch)) onKey(ch);
      tInput.value = "";
    });
    typeView.addEventListener("pointerdown", () => { try { tInput.focus(); } catch (_) {} });

    document.getElementById("mtnBtn").addEventListener("click", () => { showView("modeView"); beep(523, 0.08); });
    document.getElementById("modeBack").addEventListener("click", () => showView("clockView"));
    document.querySelectorAll("#modeView .btn").forEach((b) => b.addEventListener("click", () => startTyping(b.dataset.mode)));
    document.getElementById("tQuit").addEventListener("click", () => { if (T) clearInterval(T.timerId); showView("clockView"); });
    document.getElementById("rRetry").addEventListener("click", () => startTyping(T.mode));
    document.getElementById("rMode").addEventListener("click", () => showView("modeView"));
    document.getElementById("rHome").addEventListener("click", () => showView("clockView"));

    /* ---------- 埋め込み幅にぴったり収める ---------- */
    const fitBox = document.getElementById("fit");
    const stage = document.getElementById("stage");
    function applyFit() {
      stage.style.transform = "none";
      const w = stage.offsetWidth, h = stage.offsetHeight;
      const availW = document.documentElement.clientWidth || window.innerWidth;
      const availH = document.documentElement.clientHeight || window.innerHeight;
      let scale = Math.min(availW / w, availH / h);
      scale = Math.max(0.1, Math.min(scale, 1.6));
      stage.style.transform = "scale(" + scale + ")";
      fitBox.style.width = w * scale + "px";
      fitBox.style.height = h * scale + "px";
    }
    window.applyFit = applyFit;
    window.addEventListener("resize", applyFit);
    window.addEventListener("load", applyFit);

    render(); applyFit(); setInterval(render, 250);
  })();
  </script>
</body>
</html>
